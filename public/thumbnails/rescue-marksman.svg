<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 480 270"
  preserveAspectRatio="xMidYMid slice"
  role="img"
  aria-label="Rescue Marksman preview"
>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101b31" />
      <stop offset="62%" stop-color="#090e1a" />
      <stop offset="100%" stop-color="#16091f" />
    </linearGradient>
    <radialGradient id="glowA" cx="0.18" cy="0.15" r="0.75">
      <stop offset="0%" stop-color="#6ee7ff" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#6ee7ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="0.85" cy="0.22" r="0.72">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="170%">
