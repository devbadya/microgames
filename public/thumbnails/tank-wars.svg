<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="120" height="90" viewBox="0 0 120 90">
  <defs>
    <clipPath id="twThumbClip">
      <rect width="120" height="90" rx="10" ry="10" />
    </clipPath>
    <linearGradient id="twVignette" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)" />
      <stop offset="50%" stop-color="rgba(0,0,0,0)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0.18)" />
    </linearGradient>
  </defs>
  <g clip-path="url(#twThumbClip)">
    <rect width="120" height="90" fill="#b5a57d" />
    <image
      xlink:href="../games/tank-wars/kenney/PNG/Environment/sand.png"
      href="../games/tank-wars/kenney/PNG/Environment/sand.png"
      x="-20"
      y="-10"
      width="160"
      height="120"
      preserveAspectRatio="xMidYMid slice"
      opacity="0.92"
    />
    <image
      xlink:href="../games/tank-wars/kenney/PNG/Tanks/tankGreen.png"
      href="../games/tank-wars/kenney/PNG/Tanks/tankGreen.png"
      x="14"
      y="16"
      width="92"
      height="58"
      preserveAspectRatio="xMidYMid meet"
    />
    <rect width="120" height="90" fill="url(#twVignette)" />
  </g>
  <rect width="120" height="90" rx="10" ry="10" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
</svg>
