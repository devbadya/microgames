<svg xmlns="http://www.w3.org/2000/svg" width="120" height="90" viewBox="0 0 120 90">
  <defs>
    <clipPath id="taCartoonClip">
      <rect width="120" height="90" rx="12" ry="12" />
    </clipPath>
    <linearGradient id="taToonSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6d28d9" />
      <stop offset="38%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="taToonHillBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a3e635" />
      <stop offset="100%" stop-color="#4d7c0f" />
    </linearGradient>
    <linearGradient id="taToonHillFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bef264" />
      <stop offset="100%" stop-color="#65a30d" />
    </linearGradient>
    <linearGradient id="taHullPlayer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#15803d" />
    </linearGradient>
    <linearGradient id="taHullEnemy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>
  </defs>
  <g clip-path="url(#taCartoonClip)">
    <rect width="120" height="90" fill="url(#taToonSky)" />
    <!-- Sonne -->
    <circle cx="98" cy="16" r="11" fill="#fef08a" stroke="#ca8a04" stroke-width="2" />
    <circle cx="94" cy="12" r="2.2" fill="#fffbeb" opacity="0.95" />
    <!-- Wolken -->
    <g fill="#f8fafc" stroke="#1e3a5f" stroke-width="2" stroke-linejoin="round">
      <path d="M8 24 c0-4 4-7 9-6 2-5 9-7 14-3 3-4 9-3 11 2 4 0 7 3 7 7 H10 c-1 0-2-1-2-3 z" />
      <path d="M72 20 c0-3 3-6 8-5 2-4 7-5 11-2 2-3 7-2 9 2 3 0 6 2 6 5 H74 c-1 0-2-1-2-2 z" />
    </g>
    <!-- Hügel hinten -->
    <path
      fill="url(#taToonHillBack)"
      stroke="#365314"
      stroke-width="2.5"
      stroke-linejoin="round"
      d="M-4 90 L-4 70 Q18 58 42 66 T88 62 L124 68 L124 90 Z"
    />
    <!-- Hügel vorne -->
    <path
      fill="url(#taToonHillFront)"
      stroke="#3f6212"
      stroke-width="2.5"
      stroke-linejoin="round"
      d="M0 90 L0 74 Q28 64 54 72 T112 66 L120 70 L120 90 Z"
    />
    <!-- Flugbahn (Outline + Fill) -->
    <path
      d="M 34 56 Q 60 8 98 48"
      fill="none"
      stroke="#0f172a"
      stroke-width="5"
      stroke-linecap="round"
    />
    <path
      d="M 34 56 Q 60 8 98 48"
      fill="none"
      stroke="#fbbf24"
      stroke-width="3"
      stroke-linecap="round"
    />
    <path
      d="M 34 56 Q 60 8 98 48"
      fill="none"
      stroke="#fff7ed"
      stroke-width="1.2"
      stroke-linecap="round"
      stroke-dasharray="4 5"
      opacity="0.95"
    />
    <!-- Geschoss -->
    <circle cx="58" cy="26" r="6" fill="#0f172a" stroke="#f8fafc" stroke-width="1.8" />
    <circle cx="57" cy="24" r="2.2" fill="#fde047" />
    <!-- Spielerpanzer (Cartoon) -->
    <g transform="translate(6, 44)">
      <rect x="0" y="10" width="34" height="14" rx="5" fill="url(#taHullPlayer)" stroke="#14532d" stroke-width="2" />
      <rect x="10" y="4" width="16" height="12" rx="3" fill="#22c55e" stroke="#14532d" stroke-width="2" />
      <rect x="26" y="14" width="18" height="6" rx="2" fill="#166534" stroke="#052e16" stroke-width="1.5" />
      <path d="M6 24 L8 28 M14 24 L16 28 M22 24 L24 28 M28 24 L30 28" stroke="#14532d" stroke-width="2" stroke-linecap="round" />
    </g>
    <!-- Gegner -->
    <g transform="translate(68, 42)">
      <rect x="0" y="12" width="36" height="15" rx="5" fill="url(#taHullEnemy)" stroke="#334155" stroke-width="2" />
      <rect x="11" y="5" width="17" height="13" rx="3" fill="#94a3b8" stroke="#334155" stroke-width="2" />
      <rect x="-12" y="16" width="14" height="6" rx="2" fill="#475569" stroke="#1e293b" stroke-width="1.5" />
      <path d="M8 27 L10 31 M16 27 L18 31 M24 27 L26 31 M30 27 L32 31" stroke="#334155" stroke-width="2" stroke-linecap="round" />
    </g>
    <!-- leichter Rahmen-Glanz -->
    <rect width="120" height="90" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" rx="12" ry="12" />
  </g>
  <rect width="120" height="90" rx="12" ry="12" fill="none" stroke="#020617" stroke-width="2.5" opacity="0.35" />
</svg>
