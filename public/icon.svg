<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  role="img"
  aria-label="microgames logo"
>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2c47" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9af2ff" />
      <stop offset="100%" stop-color="#52c4e0" />
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8b3ff" />
      <stop offset="100%" stop-color="#8a6ce8" />
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffc798" />
      <stop offset="100%" stop-color="#e89758" />
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9b9b" />
      <stop offset="100%" stop-color="#e26060" />
    </linearGradient>
    <radialGradient id="shine" cx="0.3" cy="0.15" r="0.7">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)" />
  <rect width="64" height="64" rx="14" fill="url(#shine)" />
  <rect
    x="0.5"
    y="0.5"
    width="63"
    height="63"
    rx="13.5"
    fill="none"
    stroke="rgba(255,255,255,0.08)"
    stroke-width="1"
  />

  <rect x="13" y="13" width="17" height="17" rx="3.5" fill="url(#cyan)" />
  <rect x="34" y="13" width="17" height="17" rx="3.5" fill="url(#purple)" />
  <rect x="13" y="34" width="17" height="17" rx="3.5" fill="url(#orange)" />
  <rect x="34" y="34" width="17" height="17" rx="3.5" fill="url(#pink)" />
</svg>
