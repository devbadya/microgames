<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tetris — microgames</title>
    <meta name="description" content="Classic Tetris built with the PlayCanvas engine." />
    <link rel="stylesheet" href="../../assets/style.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="gameBody">
    <div class="bgGlow" aria-hidden="true"></div>

    <header class="gameTopbar">
      <a class="link backLink" href="../../">← All games</a>
      <h1 class="gameTitle">Tetris</h1>
      <div class="hud" aria-label="Game stats">
        <div class="hudItem">
          <span class="hudLabel">Score</span>
          <span id="score" class="hudValue">0</span>
        </div>
        <div class="hudItem">
          <span class="hudLabel">Lines</span>
          <span id="lines" class="hudValue">0</span>
        </div>
        <div class="hudItem">
          <span class="hudLabel">Level</span>
          <span id="level" class="hudValue">1</span>
        </div>
      </div>
    </header>

    <main class="gameStage" id="stage">
      <canvas id="app"></canvas>
      <div id="overlay" class="overlay" hidden>
        <div class="overlayInner">
          <p id="overlayMsg" class="overlayMsg">Press Enter to start</p>
          <p class="overlayHint">Arrows to move · ↑ rotate · Space hard-drop</p>
        </div>
      </div>
    </main>

    <footer class="gameHelp">
      <span><kbd>←</kbd><kbd>→</kbd> move</span>
      <span><kbd>↑</kbd> rotate</span>
      <span><kbd>↓</kbd> soft drop</span>
      <span><kbd>Space</kbd> hard drop</span>
      <span><kbd>P</kbd> pause</span>
      <span><kbd>R</kbd> restart</span>
    </footer>

    <script type="module" src="./main.js"></script>
  </body>
</html>
