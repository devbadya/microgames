<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1"
    />
    <meta name="theme-color" content="#07090f" />
    <title>Tetris — microgames</title>
    <meta name="description" content="10 levels of stack-and-clear puzzles with garbage rows, narrowing fields and a Tetris-only gauntlet." />
    <link rel="icon" type="image/svg+xml" href="../../icon.svg" />
    <link rel="apple-touch-icon" href="../../icon.svg" />
    <link rel="stylesheet" href="../../assets/style.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="gameBody">
    <div class="bgGlow" aria-hidden="true"></div>

    <header class="gameTopbar">
      <a class="link backLink" href="../../">← All games</a>
      <h1 class="gameTitle">Tetris</h1>
      <div class="hud" aria-label="Game stats">
        <div class="hudItem">
          <span class="hudLabel">Level</span>
          <span id="hudLevel" class="hudValue">1</span>
        </div>
        <div class="hudItem">
          <span class="hudLabel">Lines</span>
          <span id="hudLines" class="hudValue">0/0</span>
        </div>
        <div class="hudItem">
          <span class="hudLabel">Score</span>
          <span id="hudScore" class="hudValue">0</span>
        </div>
      </div>
    </header>

    <main class="gameStage" id="stage">
      <canvas id="app"></canvas>
      <div id="modifierBadge" class="tetrisModifier"></div>

      <div id="overlay" class="overlay">
        <div class="overlayInner">
          <p class="overlayEyebrow" id="overlayEyebrow">Tetris</p>
          <p id="overlayMsg" class="overlayMsg">Pick a level</p>
          <p id="overlayHint" class="overlayHint">Stack lines, climb the campaign.</p>

          <section id="levelSelect" class="shLevelSelect">
            <div id="levelGrid" class="shLevelGrid"></div>
          </section>

          <div class="overlayActions">
            <button type="button" class="overlayBtn overlayBtn--primary" id="overlayPrimaryBtn">
              Continue
            </button>
            <button type="button" class="overlayBtn" id="overlaySecondaryBtn" hidden>
              Levels
            </button>
          </div>
        </div>
      </div>
    </main>

    <footer class="gameHelp">
      <span><kbd>←</kbd><kbd>→</kbd> move</span>
      <span><kbd>↑</kbd> rotate</span>
      <span><kbd>↓</kbd> soft drop</span>
      <span><kbd>Space</kbd> hard drop</span>
      <span><kbd>P</kbd> pause</span>
      <span><kbd>Esc</kbd> levels</span>
    </footer>

    <nav class="touchControls" id="touchControls" aria-label="Game controls">
      <button type="button" class="touchBtn" data-action="left" aria-label="Move left">←</button>
      <button type="button" class="touchBtn" data-action="rotate" aria-label="Rotate">↻</button>
      <button type="button" class="touchBtn" data-action="right" aria-label="Move right">→</button>
      <button type="button" class="touchBtn" data-action="softdrop" aria-label="Soft drop">↓</button>
      <button type="button" class="touchBtn touchBtn--accent" data-action="harddrop" aria-label="Hard drop">⤓</button>
    </nav>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
