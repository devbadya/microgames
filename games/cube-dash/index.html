<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1"
    />
    <meta name="theme-color" content="#07090f" />
    <title>Cube Dash — microgames</title>
    <meta name="description" content="Jump a neon cube through a fast obstacle course." />
    <link rel="icon" type="image/svg+xml" href="../../icon.svg" />
    <link rel="apple-touch-icon" href="../../icon.svg" />
    <link rel="stylesheet" href="../../assets/style.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="gameBody">
    <div class="bgGlow" aria-hidden="true"></div>

    <header class="gameTopbar">
      <a class="link backLink" href="../../">← All games</a>
      <h1 class="gameTitle">Cube Dash</h1>
      <div class="hud" aria-label="Game stats">
        <div class="hudItem">
          <span class="hudLabel">Score</span>
          <span id="score" class="hudValue">0</span>
        </div>
        <div class="hudItem">
          <span class="hudLabel">Best</span>
          <span id="best" class="hudValue">0</span>
        </div>
        <div class="hudItem">
          <span class="hudLabel">Speed</span>
          <span id="speed" class="hudValue">1.0×</span>
        </div>
      </div>
    </header>

    <main class="gameStage" id="stage">
      <canvas id="app"></canvas>
      <div id="overlay" class="overlay">
        <div class="overlayInner">
          <p id="overlayMsg" class="overlayMsg">Tap to start</p>
          <p class="overlayHint">Tap, click, or press Space to jump.</p>
        </div>
      </div>
    </main>

    <footer class="gameHelp">
      <span><kbd>Space</kbd> jump</span>
      <span><kbd>Click</kbd> jump</span>
      <span><kbd>Tap</kbd> jump</span>
      <span><kbd>Enter</kbd> restart</span>
    </footer>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
