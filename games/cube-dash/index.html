<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1"
    />
    <meta name="theme-color" content="#07090f" />
    <title>Cube Dash — microgames</title>
    <meta name="description" content="Jump a neon cube through a fast obstacle course." />
    <link rel="icon" type="image/svg+xml" href="../../icon.svg" />
    <link rel="apple-touch-icon" href="../../icon.svg" />
    <link rel="stylesheet" href="../../assets/style.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="gameBody">
    <div class="bgGlow" aria-hidden="true"></div>

    <header class="gameTopbar">
      <a class="link backLink" href="../../">← All games</a>
      <h1 class="gameTitle">Cube Dash</h1>
      <button type="button" class="settingsBtn" id="iconSettingsBtn" aria-expanded="false" aria-controls="iconSettingsPanel">
        Icon
      </button>
      <div class="hud" aria-label="Game stats">
        <div class="hudItem">
          <span class="hudLabel">Score</span>
          <span id="score" class="hudValue">0</span>
        </div>
        <div class="hudItem">
          <span class="hudLabel">Best</span>
          <span id="best" class="hudValue">0</span>
        </div>
        <div class="hudItem hudProgress">
          <span class="hudLabel">Progress</span>
          <span id="progress" class="hudValue">0%</span>
          <span class="progressBar" aria-hidden="true"><span id="progressFill" class="progressFill"></span></span>
        </div>
      </div>
    </header>

    <aside class="iconSettingsPanel" id="iconSettingsPanel" aria-label="Icon settings" hidden>
      <div class="settingGroup">
        <label class="settingLabel" for="iconColor">Icon color</label>
        <input id="iconColor" class="colorInput" type="color" value="#a78bfa" />
        <div class="swatches" aria-label="Preset colors">
          <button type="button" class="swatch" data-color="#a78bfa" style="--swatch: #a78bfa" aria-label="Purple"></button>
          <button type="button" class="swatch" data-color="#6ee7ff" style="--swatch: #6ee7ff" aria-label="Cyan"></button>
          <button type="button" class="swatch" data-color="#22c55e" style="--swatch: #22c55e" aria-label="Green"></button>
          <button type="button" class="swatch" data-color="#facc15" style="--swatch: #facc15" aria-label="Yellow"></button>
          <button type="button" class="swatch" data-color="#fb7185" style="--swatch: #fb7185" aria-label="Pink"></button>
          <button type="button" class="swatch" data-color="#f97316" style="--swatch: #f97316" aria-label="Orange"></button>
        </div>
      </div>
      <div class="settingGroup">
        <div class="settingLabel">Icon shape</div>
        <div class="shapeGrid" aria-label="Icon shapes">
          <button type="button" class="shapeBtn" data-shape="cube">Cube</button>
          <button type="button" class="shapeBtn" data-shape="diamond">Diamond</button>
          <button type="button" class="shapeBtn" data-shape="orb">Orb</button>
          <button type="button" class="shapeBtn" data-shape="wide">Wide</button>
        </div>
      </div>
    </aside>

    <main class="gameStage" id="stage">
      <canvas id="app"></canvas>
      <div id="overlay" class="overlay">
        <div class="overlayInner">
          <p id="overlayMsg" class="overlayMsg">Tap to start</p>
          <p class="overlayHint">
            Tap or Space to jump. Touch yellow pads on the ground for a high boost, tap on yellow orbs in mid-air for a second jump.
          </p>
        </div>
      </div>
    </main>

    <footer class="gameHelp">
      <span><kbd>Space</kbd> jump</span>
      <span><kbd>Click</kbd> jump</span>
      <span><kbd>Tap</kbd> jump</span>
      <span><kbd>Enter</kbd> restart</span>
    </footer>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
