<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#07090f" />
    <title>Panic Button — microgames</title>
    <meta name="description" content="10 levels of clean-green reaction tests, fakeouts and tightening windows." />
    <link rel="icon" type="image/svg+xml" href="../../icon.svg" />
    <link rel="stylesheet" href="../../assets/style.css" />
    <link rel="stylesheet" href="../sky-hopper/style.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="gameBody">
    <div class="bgGlow" aria-hidden="true"></div>
    <header class="gameTopbar">
      <a class="link backLink" href="../../">← All games</a>
      <h1 class="gameTitle">Panic Button</h1>
      <div class="hud" aria-label="Game stats">
        <div class="hudItem">
          <span class="hudLabel">Level</span>
          <span id="hudLevel" class="hudValue">1</span>
        </div>
        <div class="hudItem">
          <span class="hudLabel">Hits</span>
          <span id="hudHits" class="hudValue">0/0</span>
        </div>
        <div class="hudItem">
          <span class="hudLabel">Combo</span>
          <span id="hudCombo" class="hudValue">0</span>
        </div>
        <div class="hudItem">
          <span class="hudLabel">Score</span>
          <span id="hudScore" class="hudValue">0</span>
        </div>
        <div class="hudItem">
          <span class="hudLabel">Fails</span>
          <span id="hudFails" class="hudValue">0/0</span>
        </div>
      </div>
    </header>

    <main class="gameStage panicStage">
      <p id="status" class="panicStatus">Pick a level — green is the goal</p>
      <div class="panicPadWrap">
        <button type="button" id="tap" class="panicPad waiting" aria-label="Game tap zone">
          <span id="padLabel">PICK A LEVEL</span>
        </button>
      </div>
      <p id="modifier" class="panicModifier" aria-live="polite"></p>

      <div id="overlay" class="overlay">
        <div class="overlayInner overlayInner--wide">
          <p class="overlayEyebrow" id="overlayEyebrow">Panic Button</p>
          <p id="overlayMsg" class="overlayMsg">Pick a level</p>
          <p id="overlayHint" class="overlayHint">Hammer GREEN, freeze on RED.</p>

          <section id="levelSelect" class="shLevelSelect">
            <div id="levelGrid" class="shLevelGrid"></div>
          </section>

          <div class="overlayActions">
            <button type="button" class="overlayBtn overlayBtn--primary" id="overlayPrimaryBtn">
              Continue
            </button>
            <button type="button" class="overlayBtn" id="overlaySecondaryBtn" hidden>
              Levels
            </button>
          </div>
        </div>
      </div>
    </main>

    <footer class="gameHelp">
      <span><kbd>Space</kbd> tap</span>
      <span><kbd>Esc</kbd> level select</span>
      <span><kbd>Click</kbd> tap</span>
    </footer>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
