<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1"
    />
    <meta name="theme-color" content="#07090f" />
    <title>Dino Run — microgames</title>
    <meta
      name="description"
      content="Jump over cacti and duck under flyers in this endless runner inspired by the classic offline dino game."
    />
    <link rel="icon" type="image/svg+xml" href="../../icon.svg" />
    <link rel="apple-touch-icon" href="../../icon.svg" />
    <link rel="stylesheet" href="../../assets/style.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="gameBody dinoArcadeTheme">
    <div class="bgGlow" aria-hidden="true"></div>

    <header class="gameTopbar">
      <a class="link backLink" href="../../">← All games</a>
      <h1 class="gameTitle">Dino Run</h1>
      <button type="button" class="pauseBtn" id="pauseBtn" hidden aria-label="Pause game">Pause</button>
      <div class="hud" aria-label="Game stats">
        <div class="hudItem">
          <span class="hudLabel">Score</span>
          <span id="score" class="hudValue">0</span>
        </div>
        <div class="hudItem">
          <span class="hudLabel">Best</span>
          <span id="best" class="hudValue">0</span>
        </div>
      </div>
    </header>

    <main class="gameStage" id="stage">
      <canvas id="app"></canvas>
      <div id="setupOverlay" class="overlay setupOverlay" role="dialog" aria-modal="true" aria-labelledby="setupTitle">
        <div class="overlayInner setupInner">
          <h2 id="setupTitle" class="overlayMsg">Offline runner</h2>
          <p class="overlayHint">
            Same dinosaur as Chromium’s dinosaur game — pick a colour, then continue.
          </p>
          <div class="dinoColorRow">
            <label class="dinoColorLabel" for="dinoColor">Colour</label>
            <input type="color" id="dinoColor" class="dinoColorInput" value="#535353" />
          </div>
          <button type="button" class="pausePrimary" id="setupContinue">Continue</button>
        </div>
      </div>
      <div id="overlay" class="overlay" hidden>
        <div class="overlayInner">
          <p id="overlayMsg" class="overlayMsg">Space or tap to start</p>
          <p class="overlayHint">Space / tap = jump · Down = duck</p>
          <button type="button" class="changeColorBtn" id="changeColorBtn" hidden>
            Change colour…
          </button>
        </div>
      </div>
      <div id="pauseOverlay" class="overlay pauseOverlay" hidden>
        <div
          class="overlayInner pauseInner"
          role="dialog"
          aria-modal="true"
          aria-labelledby="pauseTitle"
        >
          <h2 id="pauseTitle" class="overlayMsg">Paused</h2>
          <p class="overlayHint">Take a break — or leave to the game list.</p>
          <div class="pauseActions">
            <button type="button" class="pausePrimary" id="pauseContinue">Continue</button>
            <a class="pauseExit" id="pauseLeave" href="../../">Leave</a>
          </div>
        </div>
      </div>
    </main>

    <footer class="gameHelp">
      <span><kbd>Space</kbd> jump</span>
      <span><kbd>↓</kbd> duck</span>
      <span><kbd>P</kbd> / <kbd>Esc</kbd> pause</span>
      <span><kbd>Enter</kbd> restart</span>
    </footer>

    <nav class="touchControls" id="touchControls" aria-label="Touch controls">
      <button type="button" class="touchBtn touchBtn--accent" id="touchJump" aria-label="Jump">Jump</button>
      <button type="button" class="touchBtn" id="touchDuck" aria-label="Duck">Duck</button>
    </nav>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
