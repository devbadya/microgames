<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1"
    />
    <meta name="theme-color" content="#07090f" />
    <title>Sky Hopper — microgames</title>
    <meta name="description" content="Tap to flap through 10 levels of glowing gates and shifting hazards." />
    <link rel="icon" type="image/svg+xml" href="../../icon.svg" />
    <link rel="apple-touch-icon" href="../../icon.svg" />
    <link rel="stylesheet" href="../../assets/style.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="gameBody">
    <div class="bgGlow" aria-hidden="true"></div>

    <header class="gameTopbar">
      <a class="link backLink" href="../../">← All games</a>
      <h1 class="gameTitle">Sky Hopper</h1>
      <div class="hud" aria-label="Game stats">
        <div class="hudItem">
          <span class="hudLabel">Level</span>
          <span id="hudLevel" class="hudValue">1</span>
        </div>
        <div class="hudItem">
          <span class="hudLabel">Gates</span>
          <span id="hudProgress" class="hudValue">0/0</span>
        </div>
        <div class="hudItem">
          <span class="hudLabel">Best</span>
          <span id="hudBest" class="hudValue">0</span>
        </div>
      </div>
    </header>

    <main class="gameStage" id="stage">
      <canvas id="app"></canvas>

      <div id="levelBar" class="shLevelBar" aria-label="Level progress">
        <div class="shLevelBarLabel">
          <span id="levelName">First Light</span>
        </div>
        <div class="shLevelBarTrack" aria-hidden="true">
          <div class="shLevelBarFill" id="levelBarFill"></div>
        </div>
      </div>

      <div id="overlay" class="overlay" hidden>
        <div class="overlayInner overlayInner--wide">
          <p class="overlayEyebrow" id="overlayEyebrow">Sky Hopper</p>
          <p id="overlayMsg" class="overlayMsg">Pick a level</p>
          <p id="overlayHint" class="overlayHint">Choose a stage to start.</p>

          <section id="levelSelect" class="shLevelSelect" aria-label="Levels">
            <div id="levelGrid" class="shLevelGrid"></div>
          </section>

          <div class="overlayActions" id="overlayActions">
            <button type="button" class="overlayBtn overlayBtn--primary" id="overlayPrimaryBtn">
              Play
            </button>
            <button type="button" class="overlayBtn" id="overlaySecondaryBtn" hidden>
              Retry
            </button>
          </div>
        </div>
      </div>
    </main>

    <footer class="gameHelp">
      <span><kbd>Space</kbd> flap</span>
      <span><kbd>Click</kbd> flap</span>
      <span><kbd>Tap</kbd> flap</span>
      <span><kbd>Esc</kbd> level select</span>
    </footer>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
